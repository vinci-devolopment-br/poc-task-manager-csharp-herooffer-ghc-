name: .NET Build and Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    - name: Restore dependencies
      run: dotnet restore ./src/TaskManager.Web/TaskManager.Web.csproj
    - name: Build
      run: dotnet build --no-restore ./src/TaskManager.Web/TaskManager.Web.csproj
    - name: Test
      run: dotnet test --no-build --verbosity normal ./tests/TaskManager.Web.Tests/TaskManager.Web.Tests.csproj
